name: ClawCloud 自动登录保活

on:
  schedule:
    - cron: '0 1 */5 * *'  # 保持你设定的每5天运行一次
  workflow_dispatch:

# 必须开启写入权限，否则 auto-commit 插件无法工作
permissions:
  contents: write

jobs:
  auto-login:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 使用第三方 commit 插件时，用默认的 GITHUB_TOKEN 即可
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install playwright requests pynacl
          playwright install chromium
          playwright install-deps

      - name: 运行自动登录
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          GH_SESSION: ${{ secrets.GH_SESSION }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: python scripts/auto_login.py
        
      - name: Update README with timestamp
        run: |
          UTC_TIME=$(date -u +'%Y-%m-%d %H:%M:%S')
          BJ_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
          
          TIMESTAMP_SECTION="\n## 🕒 最后更新时间\n\n"
          TIMESTAMP_SECTION+="**UTC**: \`$UTC_TIME\`  \n"
          TIMESTAMP_SECTION+="**中国时间**: \`$BJ_TIME\`  \n\n"
          TIMESTAMP_SECTION+="> ⚡ 此时间戳由 GitHub Actions 自动更新，用于触发自动构建。\n"
          
          if grep -q "## 🕒 最后更新时间" README.md; then
            sed -i '/## 🕒 最后更新时间/,/^## \|^# /{//!d}' README.md
            sed -i '/## 🕒 最后更新时间/d' README.md
          fi
          
          echo -e "$TIMESTAMP_SECTION" >> README.md

      - name: Auto commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto deploy by Github Actions"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          # 同时捕获 README 变更和 Python 脚本生成的 png 截图
          file_pattern: 'README.md *.png'

      - name: 上传运行截图至 Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-screenshots
          path: ./*.png
          retention-days: 3
