name: ClawCloud 自动登录保活

on:
  schedule:
    - cron: '0 1 */5 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-login:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install playwright requests pynacl
          playwright install chromium
          playwright install-deps

      - name: 运行自动登录
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          GH_SESSION: ${{ secrets.GH_SESSION }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: python scripts/auto_login.py
        
      - name: 私有仓库 Actions 保活
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase || true
          
          # 更新活跃日志文件
          echo "Last Active: $(date +'%Y-%m-%d %H:%M:%S')" > active.log
          git add active.log
          
          git commit -m "Chore: 更新活跃日志 [skip ci]"
          
          # 使用 Token 进行显式推送，解决 403 权限问题
          git push https://x-access-token:${{ secrets.REPO_TOKEN }}@github.com/${{ github.repository }}.git main

      - name: 上传运行截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-screenshots
          path: ./*.png
          retention-days: 3
